name: Secret Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          wget -qO- https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar xz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # For PRs, scan commits in this PR
            gitleaks detect --source . --config .gitleaks.toml --log-opts="origin/main..HEAD" --redact
          elif [ "${{ github.event_name }}" = "push" ]; then
            # For pushes to main, scan all commits in the push range
            gitleaks detect --source . --config .gitleaks.toml --log-opts="${{ github.event.before }}..${{ github.sha }}" --redact
          else
            # For manual runs (workflow_dispatch), scan the working tree
            gitleaks detect --source . --config .gitleaks.toml --no-git --redact
          fi
