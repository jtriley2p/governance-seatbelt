name: Governance Checks

on:
  schedule:
    - cron: "0 */3 * * *"
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  check-proposals:
    name: Check Uniswap Proposals
    runs-on: ubuntu-24.04
    environment: ci

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"

      - name: Read Bun version
        id: bun-version
        run: echo "version=$(cat .bun-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}

      - name: Cache proposal simulation results and ABIs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            cache
            reports
          key: ${{ runner.os }}-governance-cache-${{ hashFiles('package.json', 'bun.lockb', 'index.ts', 'run-checks.ts', 'types.d.ts', 'checks/**/*', 'utils/**/*', 'presentation/**/*', 'sims/**/*') }}
          restore-keys: |
            ${{ runner.os }}-governance-cache-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache pip dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-slither-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Slither dependencies
        run: |
          pip3 install -r requirements-ci.txt

      - name: Install solc
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -fsSL --retry 5 --retry-delay 2 --retry-connrefused \
            -o "$HOME/.local/bin/solc-0.8.19" \
            https://github.com/ethereum/solidity/releases/download/v0.8.19/solc-static-linux
          curl -fsSL --retry 5 --retry-delay 2 --retry-connrefused \
            -o "$HOME/.local/bin/solc-0.8.20" \
            https://github.com/ethereum/solidity/releases/download/v0.8.20/solc-static-linux
          chmod +x "$HOME/.local/bin/solc-0.8.19" "$HOME/.local/bin/solc-0.8.20"
          ln -sf "$HOME/.local/bin/solc-0.8.20" "$HOME/.local/bin/solc"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/solc" --version

      - name: Run checks
        uses: nick-fields/retry@14672906e672a08bd6eeb15720e9ed3ce869cdd4 # v2
        with:
          timeout_minutes: 60
          max_attempts: 5
          retry_wait_seconds: 300
          command: bun start
          on_retry_command: echo "Retrying due to possible rate limiting..."
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RPC_URL: ${{ secrets.RPC_URL }}
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
          ARBITRUM_RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}
          TEMPO_RPC_URL: ${{ secrets.TEMPO_RPC_URL }}
          TENDERLY_ACCESS_TOKEN: ${{ secrets.TENDERLY_ACCESS_TOKEN }}
          TENDERLY_USER: ${{ secrets.TENDERLY_USER }}
          TENDERLY_PROJECT_SLUG: ${{ secrets.TENDERLY_PROJECT_SLUG }}
          DAO_NAME: "Uniswap"
          GOVERNOR_ADDRESS: "0x408ED6354d4973f66138C91495F2f2FCbd8724C3"

      - name: Package report bundle
        id: package-report
        if: always()
        run: |
          set -euo pipefail
          REPORT_DIR="Uniswap/0x408ED6354d4973f66138C91495F2f2FCbd8724C3"
          if [ ! -d "reports/$REPORT_DIR" ]; then
            echo "bundle-created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tar \
            --sort=name \
            --mtime='UTC 1970-01-01' \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            -C reports \
            -czf Uniswap-report.tgz \
            "$REPORT_DIR"

          sha256sum Uniswap-report.tgz > Uniswap-report.tgz.sha256
          echo "bundle-created=true" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        if: steps.package-report.outputs.bundle-created == 'true' && github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Sign report bundle
        id: sign-report
        if: steps.package-report.outputs.bundle-created == 'true' && github.event_name != 'pull_request'
        run: cosign sign-blob Uniswap-report.tgz --yes --bundle Uniswap-report.sigstore.json

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Uniswap
          path: reports/Uniswap/0x408ED6354d4973f66138C91495F2f2FCbd8724C3/

      - name: Upload signed report bundle
        if: always() && steps.package-report.outputs.bundle-created == 'true' && github.event_name != 'pull_request' && steps.sign-report.outcome == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Uniswap-signed
          path: |
            Uniswap-report.tgz
            Uniswap-report.tgz.sha256
            Uniswap-report.sigstore.json
