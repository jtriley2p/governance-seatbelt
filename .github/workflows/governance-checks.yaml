name: Governance Checks

on:
  schedule:
    - cron: "0 */3 * * *"
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-proposals:
    name: Check Uniswap Proposals
    runs-on: ubuntu-latest
    environment: ci

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"

      - name: Set up Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1
        with:
          bun-version: latest

      - name: Cache proposal simulation results and ABIs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            cache
            reports
          key: ${{ runner.os }}-governance-cache-${{ hashFiles('package.json', 'bun.lockb', 'index.ts', 'run-checks.ts', 'types.d.ts', 'checks/**/*', 'utils/**/*', 'presentation/**/*', 'sims/**/*') }}
          restore-keys: |
            ${{ runner.os }}-governance-cache-

      - name: Install dependencies
        run: bun install

      - name: Cache pip dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-slither-v1
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Slither dependencies
        run: |
          pip3 install solc-select slither-analyzer
          # Required solc versions for analyzing relevant Uniswap contracts
          solc-select install 0.8.19
          solc-select install 0.8.20
          solc-select use 0.8.20

      - name: Run checks
        uses: nick-fields/retry@14672906e672a08bd6eeb15720e9ed3ce869cdd4 # v2
        with:
          timeout_minutes: 60
          max_attempts: 5
          retry_wait_seconds: 300
          command: bun start
          on_retry_command: echo "Retrying due to possible rate limiting..."
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RPC_URL: ${{ secrets.RPC_URL }}
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
          ARBITRUM_RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}
          TENDERLY_ACCESS_TOKEN: ${{ secrets.TENDERLY_ACCESS_TOKEN }}
          TENDERLY_USER: ${{ secrets.TENDERLY_USER }}
          TENDERLY_PROJECT_SLUG: ${{ secrets.TENDERLY_PROJECT_SLUG }}
          DAO_NAME: "Uniswap"
          GOVERNOR_ADDRESS: "0x408ED6354d4973f66138C91495F2f2FCbd8724C3"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Uniswap
          path: reports/Uniswap/0x408ED6354d4973f66138C91495F2f2FCbd8724C3/
